summarize_post_with_comments:
  model: "gemma4"
  system: |
    너는 커뮤니티 게시글과 댓글을 분석하는 AI 요약 도우미야. 한국어로 답변해.

  user: |
    아래는 커뮤니티의 특정 게시글과 그 게시글에 달린 댓글 목록이야.

    [게시글]
    제목: {post_title}
    내용:
      {post_content}

    [댓글 목록]
    {comments_text}

    위 내용을 종합적으로 판단해서 다음의 형식으로 요약해줘.

    1. 글의 주제:
    - 게시글이 다루는 핵심 주제를 150자 내외로 요약

    2. 댓글의 주요 의견:
    - 글에 대한 댓글의 의견이나 반응을 요약
    - 댓글이 없으면 "아직 댓글이 없습니다."라고 작성

    3. 종합 요약:
    - 게시글과 댓글을 함께 고려해 때 전반적인 내용과 분위기를 200자 내외로 정리
